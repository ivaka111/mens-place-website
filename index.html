<!DOCTYPE html>

<head>

    * {

    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.70), rgba(0, 0, 0, 0.82)),
        url("https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=1600&q=80")
        center / cover no-repeat;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 52px 32px;
      text-align: center;
      background: rgba(14, 14, 14, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);

    .eyebrow {
      margin-bottom: 14px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.72;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1;
    }

    .subtitle {
      max-width: 520px;
      margin: 22px auto 0;
      font-size: 19px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
    }

    .button {
      display: inline-block;
      margin-top: 32px;
      padding: 17px 30px;
      border-radius: 999px;
      background: #ffffff;
      color: #111111;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .details {
      margin-top: 36px;
      display: grid;
      gap: 10px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
    }

    .details a {
      color: inherit;
    }

    .note {
      margin-top: 30px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.50);
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="eyebrow">Стара Загора</div>

      target="_blank"

    <div class="details">
